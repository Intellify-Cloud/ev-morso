<div class="row">
  <div class="col-lg-12 text-center">
    <h2 class="section-heading text-uppercase">{{ include.title | default: include.default_title }}</h2>
    {% if include.text %}
    <h3 class="section-subheading {{ include.subheading_class | default: 'text-muted' }}">{{ include.text }}</h3>
    {% endif %}
  </div>
</div>
