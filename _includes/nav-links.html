{%- for link in site.data.navigation.nav -%}
<li class="nav-item">
  {%- if link.url -%}
  <a class="nav-link js-scroll-trigger" href="{{ link.url }}">{{ link.title }}</a>
  {%- elsif link.section -%}
  <a class="nav-link js-scroll-trigger" href="{{ include.section_prefix }}{{ link.section }}">{{ link.title }}</a>
  {%- else -%}
  <a class="nav-link js-scroll-trigger" href="#">{{ link.title }}</a>
  {%- endif -%}
</li>
{% endfor %}
