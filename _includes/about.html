<!-- About -->
<section class="page-section about-section" id="{{ site.data.sitetext.about.section | default: 'about' }}">
  <div class="container">
    <div class="row about-row about-title-row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ site.data.sitetext.about.title | default: "About Us" }}</h2>
      </div>
    </div>

    {% if site.data.sitetext.about.text %}
    <div class="row about-row about-subtitle-row">
      <div class="col-lg-8 mx-auto text-center">
        <h3 class="section-subheading text-muted">{{ site.data.sitetext.about.text | markdownify | remove: '<p>' | remove: '</p>' }}</h3>
      </div>
    </div>
    {% endif %}

    <div class="row about-row about-copy-row">
      <div class="col-lg-10 mx-auto text-center">
        <div class="large text-muted about-copy">{{ site.data.sitetext.about.text2 | markdownify }}</div>
      </div>
    </div>
  </div>
</section>
<!-- End About -->
